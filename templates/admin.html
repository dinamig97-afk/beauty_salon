<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>Панель</h1>

    <h3>Роль: {{ role }}</h3>

    <div class="box">
        {% for b in bookings %}
        <div>
            {{ b[1] }} | {{ b[3] }} | {{ b[4] }} {{ b[5] }}

            {% if role == "admin" %}
            <a href="/delete/{{ b[0] }}">❌</a>
            {% endif %}
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
